<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SeekOn Training</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

<header>
<div class="logo"><a href="index.html">SeekOn</a></div>

<div class="search">
  <input type="text" id="searchInput" placeholder="Search trainings...">
  <button id="searchBtn" class="search-btn">Search</button>
</div>

<div class="icons">
<i class="fa-regular fa-bell"></i>
<i class="fa-regular fa-bookmark"></i>
<div class="avatar">U</div>
</div>
</header>

<div class="container">

<aside class="sidebar">
  <h4>Filters</h4>

  <div class="filter-group job-type">
    <h4>Training Type</h4>
    <label><input type="checkbox" value="Online"> Online</label>
    <label><input type="checkbox" value="Offline"> Offline</label>
    <label><input type="checkbox" value="Hybrid"> Hybrid</label>
    <label><input type="checkbox" value="Self-paced"> Self-paced</label>
  </div>

  <div class="filter-group experience-level">
    <h4>Level</h4>
    <label><input type="radio" name="experience" value="All" checked> All</label>
    <label><input type="radio" name="experience" value="Beginner"> Beginner</label>
    <label><input type="radio" name="experience" value="Intermediate"> Intermediate</label>
    <label><input type="radio" name="experience" value="Advanced"> Advanced</label>
  </div>

  <div class="filter-group salary-range">
    <h4>Fee range</h4>
    <div class="salary-inputs">
      <input type="number" id="salaryMin" placeholder="Min ₹" min="0">
      <input type="number" id="salaryMax" placeholder="Max ₹" min="0">
    </div>
  </div>

  <button class="primary" id="filterBtn">Apply Filters</button>
</aside>

<main class="main">

<div class="top-bar">
  <div class="top-left">
    <div class="tags" id="activeTags"></div>
    <div id="resultCount" class="result-count"></div>
  </div>
  <div>Sort by: Relevance</div>
</div>

<div id="trainingList"></div>

</main>
</div>

<footer>
<div>© 2024 SeekOn Training Platform. All rights reserved.</div>
<div>
<a href="#">Privacy Policy</a>
<a href="#">Terms</a>
</div>
</footer>

<script src="js/app.js"></script>
</body>
</html>
