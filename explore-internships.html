<h5 class="mb-4 fw-bold">Filters</h5>

<div class="mb-4">

<p class="fw-semibold">Job Type</p>

<div class="form-check">
<input class="form-check-input" type="checkbox" id="filterInternship">
<label class="form-check-label">Internship</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" id="filterTrainee">
<label class="form-check-label">Trainee</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" id="filterFulltime">
<label class="form-check-label">Full-time</label>
</div>

</div>

<div class="mb-4">

<p class="fw-semibold">Location</p>

<div class="form-check">
<input class="form-check-input" type="checkbox" id="filterRemote">
<label class="form-check-label">Remote</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" id="filterOnsite">

</div>

</div>

<div class="col-md-9">

<div class="d-flex justify-content-between align-items-center mb-4">

<h4 class="fw-bold">Explore Internships</h4>

<input
type="text"
class="form-control w-50"
id="searchInput"
placeholder="Search by title, company or skill">

</div>

<p class="text-muted" id="resultCount"></p>

<!-- INTERNSHIP CARDS RENDER HERE -->

<div class="row g-4 mt-4" id="internshipContainer"></div>

</div>

</div>
