<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SeekOn Jobs</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

<header>
<div class="logo">SeekOn</div>

<div class="search">
<input type="text" id="searchInput" placeholder="Search internships...">
<div class="badge">Remote</div>
</div>

<div class="icons">
<i class="fa-regular fa-bell"></i>
<i class="fa-regular fa-bookmark"></i>
<div class="avatar">U</div>
</div>
</header>

<div class="container">

<aside class="sidebar">
<h4>Filters</h4>

<div class="filter-group">
<h4>Job Type</h4>
<label><input type="checkbox" value="Full-time"> Full-time</label>
<label><input type="checkbox" value="Part-time"> Part-time</label>
<label><input type="checkbox" value="Remote"> Remote</label>
<label><input type="checkbox" value="Contract"> Contract</label>
</div>

<button class="primary" id="applyBtn">Apply Filters</button>
</aside>

<main class="main">

<div class="top-bar">
<div class="tags" id="activeTags"></div>
<div>Sort by: Relevance</div>
</div>

<div id="jobList"></div>

</main>
</div>

<footer>
<div>© 2024 SeekOn Internship Platform. All rights reserved.</div>
<div>
<a href="#">Privacy Policy</a>
<a href="#">Terms</a>
</div>
</footer>

<script src="script.js"></script>
</body>
</html>
